<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    /* 1. Make the body a flex container to push the footer to the bottom */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    body {
        display: flex;
        flex-direction: column; 
        min-height: 100vh;
    }

    .img-background {
        /* Remember to add your local file path inside the single quotes here! */
        background-image: url('');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        /* 2. Tells this container to grow and fill all empty space */
        flex-grow: 1; 
        
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        font-family: system-ui, sans-serif;
        text-align: center; 
    }

    .img-background h1 {
        font-size: 3rem;
        color: #ffffff;
        margin-bottom: .5rem;
        text-shadow: 0 2px 4px rgba(0,0,0,0.6); 
    }

    .img-background p {
        font-size: 1.25rem;
        color: #f1f5f9;
        margin: 0;
        text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }
    
    /* Base button styles shared by ALL buttons */
    .btn-round {
        font-size: 1rem;
        font-weight: 600;
        color: #ffffff;
        background-color: #011b55;
        border: none;
        border-radius: 9999px; 
        cursor: pointer;
        font-family: system-ui, sans-serif;
        text-decoration: none; /* Removes underline from the About Me link */
        transition: background-color 0.2s, transform 0.1s;
    }
    
    .btn-round:hover {
        background-color: #002b8c; 
    }

    .btn-round:active {
        transform: scale(0.95);
    }

    /* Unique settings for the pill-shaped About Me link button */
    .btn-round.aboutme {
        margin-top: 3rem;
        padding: 0.75rem 2rem; 
        display: inline-block;
    }
    
    /* The horizontal row wrapper for your icon buttons */
    .btn-group {
        display: flex;       
        flex-direction: row; 
        justify-content: center; 
        gap: 1rem;           
        margin-top: 1.5rem;    
    }

    /* Circle Buttons */
    .btn-round.music, 
    .btn-round.apps, 
    .btn-round.Merch,
    .btn-round.Donate {
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Styled the footer content properly */
    footer {
        background-color: #f1f5f9;
        padding: 1rem;
        text-align: right;
    }

    .footer-text {
        font-family: system-ui, sans-serif;
        font-size: 0.875rem;
        color: #334155;
        margin: 0;
    }
    </style>
</head>
<body>

    <div class="img-background">
        <h1>Daylen Rivas Owen</h1>
        <p>This is my Website about me!</p>
        
        <a href="AboutMe.html" class="btn-round aboutme">About Me!</a>
        
        <div class="btn-group">
            <a href="https://soundcloud.com/jaguarthepigeon" class="btn-round music" aria-label="Music">
                <i class="fa-solid fa-music"></i>
            </a>
            <a href="Apps.htm" class="btn-round apps" aria-label="Apps">
                <i class="fa-solid fa-mobile-alt"></i>
            </a>
            <a href="Merch.html" class="btn-round Merch" aria-label="Merch">
                <i class="fa-solid fa-shirt"></i>
            </a>
            <a href="Donate.html" class="btn-round Donate" aria-label="Donate">
                <i class="fa-solid fa-dollar-sign"></i>
            </a>
        </div>
    </div>

    <footer>
        <p class="footer-text">&copy; 2026 Daylen Rivas Owen. All rights reserved.</p>
    </footer>

</body>
</html>
