<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60 Second Timer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .timer-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 8;
        }

        .bg-circle {
            stroke: #2a2a30;
        }

        .progress-circle {
            stroke: #00adb5;
            stroke-dasharray: 879.64; /* 2 * PI * r (r=140) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            stroke-linecap: round;
        }

        .time-display {
            font-size: 5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            z-index: 10;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        button {
            background-color: #2a2a30;
            color: #ffffff;
            border: 2px solid #3a3a40;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
        }

        button:hover {
            background-color: #3a3a40;
            border-color: #4a4a52;
        }

        button:active {
            transform: scale(0.95);
        }

        /* FIXED: Changed from 'cursor: not-allowed' to a styled, clickable Pause button */
        button#startBtn.running {
            background-color: #ff4757;
            border-color: #ff6b81;
            color: #ffffff;
            cursor: pointer;
        }
        
        button#startBtn.running:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <svg>
            <circle class="bg-circle" cx="150" cy="150" r="140"></circle>
            <circle class="progress-circle" id="progress" cx="150" cy="150" r="140"></circle>
        </svg>
        <div class="time-display" id="display">60</div>
    </div>

    <audio id="tickAudio" src="assets/Sounds/ticking.mp3" loop></audio>
    <audio id="alarmAudio" src="assets/Sounds/alarm.mp3"></audio>

    <div class="controls">
        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>
    </div>

    <script>
    const DURATION = 60;
    let timeLeft = DURATION;
    let timerInterval = null;
    
    // FIXED: Hooking into the HTML media elements instead of dynamically generating them
    const tickAudio = document.getElementById('tickAudio');
    const alarmAudio = document.getElementById('alarmAudio');

    const display = document.getElementById('display');
    const progressCircle = document.getElementById('progress');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const circumference = 2 * Math.PI * 140;

    function updateDisplay() {
        display.textContent = timeLeft;
        const offset = circumference - (timeLeft / DURATION) * circumference;
        progressCircle.style.strokeDashoffset = offset;
    }

    function startTimer() {
        // If already running, clicking the button pauses the operation
        if (timerInterval !== null) {
            pauseTimer();
            return;
        }
        
        startBtn.textContent = 'Pause';
        startBtn.classList.add('running');
        
        // Play ticking sound safely within user-click gesture bounds
        tickAudio.play().catch(error => console.log("Audio play blocked:", error));
        
        timerInterval = setInterval(() => {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                
                startBtn.textContent = 'Start';
                startBtn.classList.remove('running');
                
                // Stop the ticking track and ring the alarm
                tickAudio.pause();
                tickAudio.currentTime = 0;
                
                alarmAudio.currentTime = 0;
                alarmAudio.play().catch(error => console.log("Alarm play blocked:", error));
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        startBtn.textContent = 'Start';
        startBtn.classList.remove('running');
        
        // Pause the ticking audio right where it is
        tickAudio.pause();
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = DURATION;
        
        startBtn.textContent = 'Start';
        startBtn.classList.remove('running');
        
        // Stop and reset playback positions for all tracks
        tickAudio.pause();
        tickAudio.currentTime = 0;
        alarmAudio.pause();
        alarmAudio.currentTime = 0;
        
        updateDisplay();
    }

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);

    // Initial setup
    updateDisplay();
</script>
</body>
</html>
