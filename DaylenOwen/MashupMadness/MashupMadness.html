<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Boardgame Companion</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      --color-bg: #1a1a1e;
      --color-barrel-bg: #252529;
      --color-border: #3f3f46;
      --color-accent-blue: #6366f1;
      --color-accent-green: #10b981;
      --color-accent-purple: #a855f7;
      --color-accent-orange: #f97316;
      --color-button-bg: #2e3056;
      --color-text-dim: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg);
      color: #ffffff;
      font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      height: 100dvh; 
      display: flex;
      flex-direction: column;
      padding: clamp(6px, 1.5vw, 16px);
      overflow: hidden; /* Hard lockdown against layout leaking */
      user-select: none;
    }

    /* Top Navigation bar */
    .top-nav {
      height: clamp(32px, 5vh, 45px);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: clamp(4px, 1vh, 12px);
      flex-shrink: 0;
      gap: 8px;
    }

    .nav-btn {
      background-color: var(--color-button-bg);
      color: #ffffff;
      border: none;
      padding: 6px clamp(8px, 1.5vw, 14px);
      font-size: clamp(10px, 1.2vw, 13px);
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
    }

    .nav-btn:hover {
      background-color: #3b3e6e;
    }

    .nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ==========================================================================
      UI BUTTONS
      ========================================================================= */

    .btn-settings {
      background: rgba(46, 48, 86, 0.4);
      color: #e0e0ff;
      border: 1px solid rgba(99, 102, 241, 0.4);
      padding: 6px clamp(10px, 1.5vw, 16px);
      font-size: clamp(10px, 1.2vw, 14px); 
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      touch-action: manipulation; 
    }

    .btn-settings:hover:not(:disabled) {
      background: rgba(99, 102, 241, 0.2);
      border-color: var(--color-accent-blue);
      color: #ffffff;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
    }

    .btn-settings:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-room {
      background-color: #27272a;
      color: var(--color-text-dim);
      border: 1px solid var(--color-border);
      padding: 5px clamp(8px, 1.2vw, 12px);
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      touch-action: manipulation;
    }

    .btn-room:hover:not(:disabled) {
      background-color: var(--color-border);
      color: #ffffff;
      border-color: #71717a;
    }

    .btn-room.active {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--color-accent-green);
      border-color: var(--color-accent-green);
    }

    .btn-room:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ==========================================================================
      MAIN FLEXIBLE FRAMEWORK (Guarantees fitting on all sizes)
      ========================================================================= */

    .dashboard-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.5vh, 12px);
      min-height: 0;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(8px, 2vh, 16px);
      min-height: 0; 
      width: 100%;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 0;
      flex: 1 1 auto; /* Allows panel to shrink or expand dynamically */
    }

    .round-header {
      color: var(--color-accent-orange);
      font-size: clamp(10px, 1.2vh, 13px);
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Smart Scale Card anchor: Scales directly to whatever is smaller—height or width */
    .card-anchor {
      width: auto;
      height: 100%;
      max-height: clamp(150px, 35vh, 380px); /* Strict upper limits depending on vertical room */
      aspect-ratio: 280 / 380;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      touch-action: manipulation;
    }

    .card-img {
      width: auto;
      height: 100%;
      max-width: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: clamp(4px, 1vh, 8px);
      justify-content: center;
      width: 100%;
      max-width: 480px; /* Limits landscape blowout width */
      min-height: 0;
      flex: 1 1 auto;
    }

    .spinner-wrapper {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .spinner-wrapper.hidden {
      display: none !important;
    }

    .wrapper-label {
      font-size: 9px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .barrel-viewport {
      height: clamp(30px, 5.5vh, 45px); 
      background-color: var(--color-barrel-bg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
    }

    .barrel-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .split-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(6px, 1vw, 10px);
    }

    /* Footer and layout stabilizers */
    .footer-bar {
      height: clamp(32px, 6vh, 45px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: clamp(2px, 0.5vh, 6px);
      position: relative;
      flex-shrink: 0;
    }

    .output-label {
      font-size: clamp(11px, 1.3vw, 14px);
      font-weight: bold;
      color: #ffffff;
      flex-grow: 1;
      text-align: center;
    }

    .btn-end-turn {
      background-color: var(--color-accent-orange);
      color: white;
      border: none;
      padding: 6px clamp(10px, 1.5vw, 16px);
      font-size: clamp(11px, 1.2vw, 13px);
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-end-turn:hover { background-color: #e26312; }
    .btn-end-turn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Game Over Layout */
    .game-over-view {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 10; /* Ensures it sits on top of everything else */
      text-align: center;
      width: 90%; /* Keeps text from touching edges on small screens */
      max-width: 400px;
    }

    .go-title {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: bold;
      color: var(--color-accent-orange);
    }

    .go-desc {
      font-size: clamp(11px, 1.2vw, 13px);
      color: var(--color-text-dim);
    }

    .restart-btn {
      background-color: var(--color-accent-green);
      color: white;
      border: none;
      padding: 8px 16px;
      font-size: clamp(12px, 1.5vw, 15px);
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* Popups Window System */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      visibility: hidden;
    }

    .popup-overlay.active {
      visibility: visible;
    }

    .popup-content {
      background-color: var(--color-bg);
      border: 1px solid var(--color-border);
      width: 90%;
      max-width: 400px;
      max-height: 85vh;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .popup-header {
      font-size: 15px;
      font-weight: bold;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: bold;
    }

    .form-group input, .form-group textarea {
      background-color: var(--color-barrel-bg);
      border: 1px solid var(--color-border);
      color: white;
      padding: 6px;
      border-radius: 4px;
      font-family: inherit;
    }

    .form-group textarea {
      height: 50px;
      resize: none;
    }

    .btn-bar {
      display: flex;
      gap: 8px;
      margin-top: 5px;
    }

    .btn-bar button {
      flex: 1;
      padding: 8px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-save { background-color: var(--color-button-bg); color: white; }
    .btn-cancel { background-color: var(--color-border); color: white; }

    /* Dropdowns */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      left: 0;
      background-color: var(--color-barrel-bg);
      min-width: 140px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      z-index: 1000;
      margin-top: 5px;
    }

    .dropdown-content a {
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      display: block;
      font-size: 13px;
    }

    .dropdown-content a:hover {
      background-color: var(--color-border);
      border-radius: 5px;
    }

    .dropdown-content.show {
      display: block;
    }

    /* Player list container */
    .player-list-box {
      background-color: #111114;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 6px;
      max-height: 110px;
      overflow-y: auto;
    }
    
    .player-entry {
      padding: 4px 6px;
      font-size: clamp(11px, 1.2vw, 14px);
      border-bottom: 1px solid #252529;
    }
    
    .player-entry:last-child { border-bottom: none; }

    /* ==========================================================================
      RESPONSIVE GRID & ASPECT RATIO CONTROLLER
      ========================================================================= */

    /* Applies when landscape (wider than tall) */
    @media (min-aspect-ratio: 1/1) {
      .main-container {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: clamp(10px, 3vw, 24px);
        align-items: center;
        max-width: 1000px;
        margin: 0 auto;
      }

      .left-panel {
        height: 100%;
        justify-content: center;
      }

      .card-anchor {
        /* Pivots dynamically on the vertical height of the device screen */
        height: 100%;
        max-height: clamp(180px, 50vh, 450px); 
        width: auto;
      }

      .right-panel {
        max-width: 100%;
      }
    }

    /* Micro-Height Landscape Safeguard (For tiny or extremely flat mobile landscape ratios) */
    @media (max-height: 480px) and (min-aspect-ratio: 1/1) {
      body {
        padding: 4px;
      }
      .top-nav {
        height: 30px;
        margin-bottom: 4px;
      }
      .main-container {
        gap: 8px;
      }
      .card-anchor {
        max-height: 45vh;
      }
      .barrel-viewport {
        height: 32px;
      }
      .footer-bar {
        height: 32px;
      }
    }
</style>
</head>
<body>

  <div class="top-nav">
    <div class="dropdown">
      <button class="nav-btn" id="myGamesBtn">My Games</button>
      <div class="dropdown-content" id="myGamesDropdown">
        <a href="Chameleon.html">Chameleon</a>
        <a href="Telestrations.html">Telestrations</a>
      </div>
    </div>
    <button class="nav-btn" id="roomBtn" onclick="openRoomPopup()">Room</button>
    <button class="nav-btn" id="settingsBtn" onclick="openPromptEditor()" style="margin-left: auto;">Settings</button>
  </div>

  <div class="dashboard-layout">
    <div class="main-container" id="viewContainer">
      <div class="left-panel" id="leftPanel">
        <div class="round-header" id="roundHeader">Round 1: Talk! | (Turn-limited actions)</div>
        <div class="card-anchor" onclick="handleCardClick()">
          <img class="card-img" id="cardImage" src="assets/Sprites/back.png" alt="Card Face">
        </div>
      </div>

      <div class="right-panel" id="rightPanel">
        <div class="spinner-wrapper" id="wrapper-words">
          <span class="wrapper-label" style="color: var(--color-accent-blue);">Words (Your Screen Only)</span>
          <div class="barrel-viewport" onclick="triggerSpinner('words')">
            <canvas class="barrel-canvas" id="canvas-words"></canvas>
          </div>
        </div>

        <div class="spinner-wrapper" id="wrapper-actions">
          <span class="wrapper-label" style="color: var(--color-accent-green);">Action (Your Screen Only)</span>
          <div class="barrel-viewport" onclick="triggerSpinner('actions')">
            <canvas class="barrel-canvas" id="canvas-actions"></canvas>
          </div>
        </div>

        <div class="spinner-wrapper" id="wrapper-categories">
          <span class="wrapper-label" style="color: var(--color-accent-purple);">Categories</span>
          <div class="barrel-viewport" onclick="triggerSpinner('categories')">
            <canvas class="barrel-canvas" id="canvas-categories"></canvas>
          </div>
        </div>

        <div class="split-row">
          <div class="spinner-wrapper" id="wrapper-letters">
            <span class="wrapper-label" style="color: var(--color-accent-orange);">Letters</span>
            <div class="barrel-viewport" onclick="triggerSpinner('letters')">
              <canvas class="barrel-canvas" id="canvas-letters"></canvas>
            </div>
          </div>

          <div class="spinner-wrapper" id="wrapper-vowels">
            <span class="wrapper-label" style="color: var(--color-accent-blue);">Vowels</span>
            <div class="barrel-viewport" onclick="triggerSpinner('vowels')">
              <canvas class="barrel-canvas" id="canvas-vowels"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="output-label" id="outputLabel">Join or create a room to begin turn rotations!</div>
    <button class="btn-end-turn" id="endTurnBtn" onclick="handleEndTurn()" disabled>End Turn</button>
  </div>

  <div class="popup-overlay" id="settingsPopup">
    <div class="popup-content">
      <div class="popup-header">Customize Configuration Settings</div>
      <div class="form-group">
        <label style="color: var(--color-accent-orange)">Card Flips Per Round:</label>
        <input type="number" id="input-limit" min="1">
      </div>
      <div class="form-group">
        <label style="color: var(--color-accent-blue)">Words Data Pool:</label>
        <textarea id="input-words"></textarea>
      </div>
      <div class="form-group">
        <label style="color: var(--color-accent-green)">Action Data Pool:</label>
        <textarea id="input-actions"></textarea>
      </div>
      <div class="form-group">
        <label style="color: var(--color-accent-purple)">Categories Data Pool:</label>
        <textarea id="input-categories"></textarea>
      </div>
      <div class="form-group">
        <label style="color: var(--color-accent-orange)">Letters Data Pool:</label>
        <textarea id="input-letters"></textarea>
      </div>
      <div class="form-group">
        <label style="color: var(--color-accent-blue)">Vowels Data Pool:</label>
        <textarea id="input-vowels"></textarea>
      </div>
      <div class="form-group">
        <label style="color: var(--color-accent-purple)">Chameleon Words Pool:</label>
        <textarea id="input-chameleon"></textarea>
      </div>
      <div class="btn-bar">
        <button class="btn-cancel" onclick="closePromptEditor()">Cancel</button>
        <button class="btn-save" onclick="saveConfigChanges()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="popup-overlay" id="roomPopup">
    <div class="popup-content" id="roomPopupContent">
    </div>
  </div>

  <script>
    let currentRoundNum = 1;
    let cardFlipsCount = 0;
    let flipsTargetLimit = 5;
    let totalPlayers = 4;

    // Strict requirements tracker allocations per turn
    let turnCardFlipsDone = 0;
    let turnSpinnerSpins = { words: 0, actions: 0, categories: 0, letters: 0, vowels: 0 };

    // --- ENHANCED: RESTORE STATE FROM SESSIONSTORAGE ---
    let localPlayerId = sessionStorage.getItem('room_localPlayerId');
    if (!localPlayerId) {
      localPlayerId = "Player_" + Math.floor(Math.random() * 9000 + 1000);
      sessionStorage.setItem('room_localPlayerId', localPlayerId);
    }
    let activeRoomCode = sessionStorage.getItem('room_activeRoomCode') || null;
    let isHost = sessionStorage.getItem('room_isHost') === 'true';
    let roomPlayersList = JSON.parse(sessionStorage.getItem('room_playersList')) || [];
    let currentTurnOwnerId = sessionStorage.getItem('room_currentTurnOwnerId') || null;

    // Dynamically synchronize player count if returning to a stored session
    if (activeRoomCode) {
      totalPlayers = roomPlayersList.length;
    }

    function saveRoomState() {
      if (activeRoomCode) {
        sessionStorage.setItem('room_activeRoomCode', activeRoomCode);
        sessionStorage.setItem('room_isHost', isHost);
        sessionStorage.setItem('room_playersList', JSON.stringify(roomPlayersList));
        sessionStorage.setItem('room_currentTurnOwnerId', currentTurnOwnerId);
      } else {
        sessionStorage.removeItem('room_activeRoomCode');
        sessionStorage.removeItem('room_isHost');
        sessionStorage.removeItem('room_playersList');
        sessionStorage.removeItem('room_currentTurnOwnerId');
      }
    }

    /* --- GLOBALLY RESOLVED NETWORKING LAYER (REPLACES LOCAL BROADCASTCHANNEL) --- */
    const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    let currentMqttTopic = null;

    mqttClient.on('connect', () => {
      console.log('Successfully connected to the global matchmaking sync network!');
      if (activeRoomCode) {
        joinRoomTopic(activeRoomCode);
      }
    });

    mqttClient.on('message', (topic, payload) => {
      try {
        const msg = JSON.parse(payload.toString());
        // Ignore echo messages broadcast by our own device
        if (msg.senderId === localPlayerId) return;

        handleIncomingNetworkMessage(msg);
      } catch (e) {
        console.error("Error decoding message:", e);
      }
    });

    function joinRoomTopic(roomCode) {
      if (currentMqttTopic) {
        mqttClient.unsubscribe(currentMqttTopic);
      }
      currentMqttTopic = `mashup_madness_room_${roomCode}`;
      mqttClient.subscribe(currentMqttTopic);
      console.log(`Subscribed to global room channel: ${currentMqttTopic}`);
    }

    function sendNetworkMessage(msg) {
      if (!activeRoomCode || !currentMqttTopic) return;
      msg.senderId = localPlayerId; // Attach sender footprint 
      mqttClient.publish(currentMqttTopic, JSON.stringify(msg));
    }

    // Audio Elements Setup
    const flipSound = new Audio('assets/sounds/flip.mp3');
    const spinSound = new Audio('assets/sounds/spin.mp3');

    const roundDescriptions = { 1: "Round 1: Talk!", 2: "Round 2: Act!", 3: "Round 3: Draw!" };
    const cardPool1 = ["assets/Sprites/0.png", "assets/Sprites/1.png", "assets/Sprites/8.png"];
    const cardPool2 = ["assets/Sprites/6.png", "assets/Sprites/7.png"];
    const cardPool3 = ["assets/Sprites/2.png", "assets/Sprites/3.png", "assets/Sprites/4.png", "assets/Sprites/5.png"];

    const myGamesBtn = document.getElementById('myGamesBtn');
    const myGamesDropdown = document.getElementById('myGamesDropdown');

    myGamesBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      myGamesDropdown.classList.toggle('show');
    });

    window.addEventListener('click', (e) => {
      if (!myGamesDropdown.contains(e.target) && e.target !== myGamesBtn) {
        myGamesDropdown.classList.remove('show');
      }
    });

    let gameDataPools = {
      words: [
        "Astronaut (Space, Rocket, Moon, Suit, NASA)", "Apple (Fruit, Red, Tree, Crisp, Pie)", 
        "Airplane (Fly, Sky, Airport, Wings, Pilot)", "Alien (Space, UFO, Green, Planet, Martian)", 
        "Anchor (Ship, Boat, Sea, Heavy, Water)", "Backpack (School, Bag, Straps, Books, Carry)", 
        "Bicycle (Wheels, Pedals, Ride, Helmet, Chain)", "Blender (Kitchen, Smoothie, Mix, Fruit, Ice)", 
        "Bear (Woods, Forest, Hibernate, Teddy, Animal)", "Banana (Fruit, Yellow, Peel, Monkey, Bunch)", 
        "Cactus (Desert, Prickly, Plant, Green, Needle)", "Camera (Photo, Picture, Lens, Flash, Shoot)", 
        "Castle (King, Queen, Palace, Stone, Old)", "Cat (Meow, Pet, Kitten, Purr, Feline)", 
        "Chef (Cook, Food, Restaurant, Kitchen, Meal)", "Dolphin (Ocean, Swim, Sea, Mammal, Flippers)", 
        "Diamond (Ring, Jewel, Gem, Expensive, Sparkle)", "Dragon (Fire, Wings, Scale, Myth, Monster)", 
        "Doctor (Hospital, Sick, Medicine, Health, Nurse)", "Donut (Sweet, Hole, Breakfast, Glazed, Pastry)", 
        "Elephant (Trunk, Big, Gray, Tusk, Africa)", "Eagle (Bird, Fly, Sky, Wings, American)", 
        "Egg (Breakfast, Chicken, Shell, Yolk, White)", "Eiffel Tower (Paris, France, Europe, Monument, Tall)", 
        "Escalator (Stairs, Moving, Mall, Up, Down)", "Firefighter (Truck, Water, Fire, Hose, Red)", 
        "Frog (Jump, Green, Toad, Pond, Hop)", "Flamingo (Pink, Bird, Leg, Water, Stand)", 
        "Guitar (Strings, Instrument, Music, Play, Acoustic)", "Gorilla (Ape, Jungle, Monkey, Large, Animal)", 
        "Gumball (Machine, Candy, Chew, Round, Bubble)", "Hammer (Nail, Tool, Hit, Pound, Construction)", 
        "Helicopter (Fly, Blades, Rotor, Sky, Chopper)", "Hotdog (Bun, Mustard, Sausage, BBQ, Meat)", 
        "Iceberg (Cold, Ocean, Ship, Glacier, Water)", "Kangaroo (Jump, Pouch, Australia, Hop, Animal)",

    class WebBarrelSpinner {
      constructor(type, accentColor) {
        this.type = type;
        this.accentColor = accentColor;
        this.canvas = document.getElementById(`canvas-${type}`);
        this.ctx = this.canvas.getContext('2d');
        this.yOffset = 0;
        this.speed = 0;
        this.isSpinning = false;
        this.rowHeight = 38;
        this.winningValue = "-";

        this.initResizing();
      }

      initResizing() {
        const resize = () => {
          const rect = this.canvas.parentElement.getBoundingClientRect();
          this.canvas.width = rect.width;
          this.canvas.height = rect.height;
          this.redraw();
        };
        window.addEventListener('resize', resize);
        setTimeout(resize, 50);
      }

      redraw() {
        const ctx = this.ctx;
        const w = this.canvas.width;
        const h = this.canvas.height;
        const options = gameDataPools[this.type];

        if (h <= 0 || w <= 0 || !options.length) return;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#252529';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#3f3f46';
        ctx.lineWidth = 1;
        ctx.strokeRect(0, 0, w, h);

        const cx = w / 2;
        const cy = h / 2;
        const numOpts = options.length;

        for (let i = -2; i <= 2; i++) {
          let itemIndex = (Math.floor(this.yOffset / this.rowHeight) + i) % numOpts;
          if (itemIndex < 0) itemIndex += numOpts;

          const exactY = cy + (i * this.rowHeight) - (this.yOffset % this.rowHeight);
          if (exactY < 0 || exactY > h) continue;

          const distFromCenter = Math.abs(exactY - cy);
          const ratio = Math.max(0, 1 - (distFromCenter / (h / 2)));

          if (ratio > 0.1) {
            let isCurrentSelected = Math.abs(exactY - cy) < this.rowHeight / 2;
            ctx.fillStyle = isCurrentSelected ? '#ffffff' : `rgba(156, 163, 175, ${ratio})`;
            ctx.font = isCurrentSelected ? `bold 16px Roboto` : `13px Roboto`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            let displayString = options[itemIndex];
            const padding = 24; // Safety margin for boundaries
            const maxWidth = w - padding;

            ctx.font = isCurrentSelected ? `bold 16px Roboto` : `13px Roboto`;

            if (ctx.measureText(displayString).width > maxWidth) {
              while (displayString.length > 0 && ctx.measureText(displayString + "...").width > maxWidth) {
                displayString = displayString.slice(0, -1);
              }
              displayString += "...";
            }

            ctx.fillText(displayString, cx, exactY);
          }
        }

        ctx.strokeStyle = this.accentColor;
        ctx.lineWidth = 2;
        const boxHalfH = this.rowHeight * 0.55;
        ctx.strokeRect(4, cy - boxHalfH, w - 8, boxHalfH * 2);
      }

      spin(customSpeed = null) {
        if (this.isSpinning || !gameDataPools[this.type].length) return;
        this.isSpinning = true;

        // Use custom speed if passed from network trigger; otherwise generate random
        this.speed = customSpeed !== null ? customSpeed : (Math.random() * 20 + 30); 

        spinSound.currentTime = 0;
        spinSound.play().catch(e => console.log(e));

        // If local turn-owner initiated a public spin, broadcast it immediately to others
        if (customSpeed === null && activeRoomCode && this.type !== 'words' && this.type !== 'actions') {
          sendNetworkMessage({
            type: 'SPIN_TRIGGER',
            roomCode: activeRoomCode,
            spinnerType: this.type,
            speed: this.speed,
            initialOffset: this.yOffset
          });
        }

        this.animate();
      }

      animate() {
        if (this.speed > 0.4) {
          this.yOffset += this.speed;
          this.speed *= 0.965; 
          this.redraw();
          // REMOVED high-frequency broadcastGameState() here to avoid network lag
          requestAnimationFrame(() => this.animate());
        } else {
          const remainder = this.yOffset % this.rowHeight;
          if (remainder !== 0) {
            if (remainder > this.rowHeight / 2) {
              this.yOffset += (this.rowHeight - remainder);
            } else {
              this.yOffset -= remainder;
            }
          }
          this.isSpinning = false;
          this.redraw();

          const options = gameDataPools[this.type];
          let winningIndex = Math.floor(this.yOffset / this.rowHeight) % options.length;
          if (winningIndex < 0) winningIndex += options.length;
          
          this.winningValue = options[winningIndex];
          if (currentRoundNum <= 3) {
            document.getElementById('outputLabel').innerText = `${this.type.toUpperCase()}: ${this.winningValue}`;
          }

          // Broadcast the final synced game state once the spin animation completes
          if (checkMyTurn()) {
            broadcastGameState();
          }
        }
      }
    }

    const spinners = {
      words: new WebBarrelSpinner('words', '#6366f1'),
      actions: new WebBarrelSpinner('actions', '#10b981'),
      categories: new WebBarrelSpinner('categories', '#a855f7'),
      letters: new WebBarrelSpinner('letters', '#f97316'),
      vowels: new WebBarrelSpinner('vowels', '#6366f1')
    };

    function checkMyTurn() {
      if (!activeRoomCode) return true; 
      return (currentTurnOwnerId === localPlayerId);
    }

    function triggerSpinner(type) {
      if (type !== 'words' && type !== 'actions' && !checkMyTurn()) {
        alert("It is not your turn!");
        return;
      }
      if (activeRoomCode && turnSpinnerSpins[type] >= 5) {
        alert(`You have hit your 5 spin limit for the '${type}' barrel spinner this turn!`);
        return;
      }
      
      turnSpinnerSpins[type]++;
      spinners[type].spin();
    }

    function handleCardClick() {
      if (!checkMyTurn()) {
        alert("It is not your turn!");
        return;
      }
      if (activeRoomCode && turnCardFlipsDone >= 1) {
        alert("You are restricted to exactly 1 card flip per turn!");
        return;
      }

      flipSound.currentTime = 0;
      flipSound.play().catch(e => console.log(e));

      const cardImg = document.getElementById('cardImage');
      let activePool = cardPool1;
      if (currentRoundNum === 2) activePool = cardPool2;
      if (currentRoundNum === 3) activePool = cardPool3;

      const randomImageSrc = activePool[Math.floor(Math.random() * activePool.length)];
      cardImg.src = randomImageSrc;

      turnCardFlipsDone++;
      cardFlipsCount++;
      
      if (cardFlipsCount >= flipsTargetLimit) {
        cardFlipsCount = 0;
        currentRoundNum++;
        if (currentRoundNum > 3) {
          showGameOverScreen();
          broadcastGameOver();
          return;
        }
      }

      document.getElementById('roundHeader').innerText = `Round ${currentRoundNum}: ${roundDescriptions[currentRoundNum] || 'Game Playing'}`;
      broadcastGameState();
    }

    function handleEndTurn() {
      if (!checkMyTurn()) return;
      
      let currentIndex = roomPlayersList.indexOf(localPlayerId);
      let nextIndex = (currentIndex + 1) % roomPlayersList.length;
      let nextPlayer = roomPlayersList[nextIndex];

      turnCardFlipsDone = 0;
      Object.keys(turnSpinnerSpins).forEach(k => turnSpinnerSpins[k] = 0);

      sendNetworkMessage({
        type: 'TURN_CHANGE',
        roomCode: activeRoomCode,
        nextTurnOwner: nextPlayer
      });

      currentTurnOwnerId = nextPlayer;
      saveRoomState();
      evaluateTurnControls();
    }

    function evaluateTurnControls() {
      const isMyTurn = checkMyTurn();
      document.getElementById('endTurnBtn').disabled = !isMyTurn;
      
      if (activeRoomCode) {
        totalPlayers = roomPlayersList.length; 
        document.getElementById('settingsBtn').disabled = !isHost; 

        document.getElementById('outputLabel').innerText = isMyTurn ? 
          "It's YOUR turn! Perform your actions and hit End Turn." : 
          `Waiting for ${currentTurnOwnerId} to finish turn...`;
      } else {
        totalPlayers = 4;
        document.getElementById('settingsBtn').disabled = false;
        document.getElementById('outputLabel').innerText = "Join or create a room to begin turn rotations!";
      }

      localStorage.setItem('globalPlayersCount', totalPlayers);

      const wrapperWords = document.getElementById('wrapper-words');
      const wrapperActions = document.getElementById('wrapper-actions');
      
      wrapperWords.classList.remove('hidden');
      wrapperActions.classList.remove('hidden');

      setTimeout(() => {
        spinners.categories.redraw();
        spinners.letters.redraw();
        spinners.vowels.redraw();
        spinners.words.redraw();
        spinners.actions.redraw();
      }, 50);
    }

    /* --- Cross-Tab/Device Networking Synchronization Handlers --- */
    function openRoomPopup() {
      renderRoomModalUI();
      document.getElementById('roomPopup').classList.add('active');
    }

    function closeRoomPopup() {
      document.getElementById('roomPopup').classList.remove('active');
    }

    function renderRoomModalUI() {
      const container = document.getElementById('roomPopupContent');
      if (!activeRoomCode) {
        container.innerHTML = `
          <div class="popup-header">Multiplayer Room Management</div>
          <p style="font-size:12px; color:var(--color-text-dim); text-align:center;">Your ID: <b>${localPlayerId}</b></p>
          <div class="btn-bar" style="margin-top:10px;">
            <button class="btn-save" onclick="networkCreateRoom()">Create Room</button>
            <button class="btn-save" style="background-color:var(--color-accent-purple);" onclick="renderJoinInputUI()">Join Room</button>
          </div>
          <div class="btn-bar">
            <button class="btn-cancel" onclick="closeRoomPopup()">Close</button>
          </div>
        `;
      } else {
        let playersHtml = roomPlayersList.map(p => `
          <div class="player-entry">${p} ${p === localPlayerId ? '<b>(You)</b>' : ''} ${p === roomPlayersList[0] ? '👑' : ''}</div>
        `).join('');

        container.innerHTML = `
          <div class="popup-header">Lobby Workspace</div>
          <div style="text-align:center; margin:5px 0;">
            <span style="font-size:11px; color:var(--color-text-dim);">ROOM CODE</span>
            <div style="font-size:22px; font-weight:bold; color:var(--color-accent-orange);">${activeRoomCode}</div>
          </div>
          <div class="form-group">
            <label>Connected Players (${roomPlayersList.length}):</label>
            <div class="player-list-box">${playersHtml}</div>
          </div>
          <p style="font-size:11px; color:var(--color-accent-green); text-align:center; margin-top:5px;">
            Turn Order: ${roomPlayersList.join(' ➡️ ')}
          </p>
          <div class="btn-bar" style="margin-top:10px;">
            <button class="btn-cancel" style="background-color:var(--accent-danger);" onclick="networkLeaveRoom()">Leave Room</button>
            <button class="btn-save" onclick="closeRoomPopup()">Return to Game</button>
          </div>
        `;
      }
    }

    function renderJoinInputUI() {
      const container = document.getElementById('roomPopupContent');
      container.innerHTML = `
        <div class="popup-header">Join Existing Session</div>
        <div class="form-group">
          <label>Enter Room Code:</label>
          <input type="text" id="joinRoomCodeInput" placeholder="EX: 1234" style="text-align:center; font-size:18px; font-weight:bold; text-transform:uppercase;">
        </div>
        <div class="btn-bar" style="margin-top:10px;">
          <button class="btn-cancel" onclick="renderRoomModalUI()">Back</button>
          <button class="btn-save" onclick="networkConfirmJoin()">Connect</button>
        </div>
      `;
    }

    function networkCreateRoom() {
      activeRoomCode = String(Math.floor(Math.random() * 8999 + 1000));
      isHost = true;
      roomPlayersList = [localPlayerId];
      currentTurnOwnerId = localPlayerId;
      totalPlayers = 1;
      
      saveRoomState();
      joinRoomTopic(activeRoomCode); 
      renderRoomModalUI();
      evaluateTurnControls();
      
      sendNetworkMessage({
        type: 'ROOM_CREATED',
        roomCode: activeRoomCode,
        hostId: localPlayerId,
        players: roomPlayersList
      });
    }

    function networkConfirmJoin() {
      const input = document.getElementById('joinRoomCodeInput').value.trim();
      if(!input) return;
      
      activeRoomCode = input;
      isHost = false;
      saveRoomState();
      joinRoomTopic(activeRoomCode); 
      
      setTimeout(() => {
        sendNetworkMessage({
          type: 'REQUEST_JOIN',
          roomCode: activeRoomCode,
          playerId: localPlayerId
        });
      }, 250);
    }

    function networkLeaveRoom() {
      sendNetworkMessage({
        type: 'PLAYER_LEAVING',
        roomCode: activeRoomCode,
        playerId: localPlayerId
      });
      
      if (currentMqttTopic) {
        mqttClient.unsubscribe(currentMqttTopic);
        currentMqttTopic = null;
      }

      activeRoomCode = null;
      isHost = false;
      roomPlayersList = [];
      currentTurnOwnerId = null;
      totalPlayers = 4;
      saveRoomState();
      
      document.getElementById('endTurnBtn').disabled = true;
      document.getElementById('outputLabel').innerText = "Join or create a room to begin turn rotations!";
      
      renderRoomModalUI();
      evaluateTurnControls();
    }

    function broadcastGameState() {
      if(!activeRoomCode) return;
      sendNetworkMessage({
        type: 'GAME_STATE_UPDATE',
        roomCode: activeRoomCode,
        round: currentRoundNum,
        flips: cardFlipsCount,
        cardSrc: document.getElementById('cardImage').src,
        categoriesValue: spinners.categories.winningValue,
        lettersValue: spinners.letters.winningValue,
        vowelsValue: spinners.vowels.winningValue,
        categoriesOffset: spinners.categories.yOffset,
        lettersOffset: spinners.letters.yOffset,
        vowelsOffset: spinners.vowels.yOffset
      });
    }

    function broadcastGameOver() {
      if(!activeRoomCode) return;
      sendNetworkMessage({
        type: 'GAME_OVER',
        roomCode: activeRoomCode
      });
    }

    function handleIncomingNetworkMessage(msg) {
      if (msg.type === 'REQUEST_JOIN' && isHost && msg.roomCode === activeRoomCode) {
        if (!roomPlayersList.includes(msg.playerId)) {
          roomPlayersList.push(msg.playerId);
        }
        totalPlayers = roomPlayersList.length;
        saveRoomState();
        renderRoomModalUI();
        
        sendNetworkMessage({
          type: 'ROOM_SYNC',
          roomCode: activeRoomCode,
          players: roomPlayersList,
          currentTurnOwner: currentTurnOwnerId,
          flipsTargetLimit: flipsTargetLimit,
          gameDataPools: gameDataPools
        });
        broadcastGameState();
      }
      
      if (msg.type === 'ROOM_SYNC' && !isHost && msg.roomCode === activeRoomCode) {
        roomPlayersList = msg.players;
        currentTurnOwnerId = msg.currentTurnOwner;
        totalPlayers = roomPlayersList.length;
        
        if (msg.flipsTargetLimit !== undefined) flipsTargetLimit = msg.flipsTargetLimit;
        if (msg.gameDataPools) {
          gameDataPools = msg.gameDataPools;
          localStorage.setItem('shared_game_data_pools', JSON.stringify(gameDataPools));
        }

        saveRoomState();
        renderRoomModalUI();
        evaluateTurnControls();
      }

      if (msg.type === 'TURN_CHANGE' && msg.roomCode === activeRoomCode) {
        currentTurnOwnerId = msg.nextTurnOwner;
        saveRoomState();
        turnCardFlipsDone = 0;
        Object.keys(turnSpinnerSpins).forEach(k => turnSpinnerSpins[k] = 0);
        evaluateTurnControls();
      }

      // Handle the trigger to spin local canvases when another player initiates a spin
      if (msg.type === 'SPIN_TRIGGER' && msg.roomCode === activeRoomCode) {
        const targetSpinner = spinners[msg.spinnerType];
        if (targetSpinner) {
          targetSpinner.yOffset = msg.initialOffset; // Sync base position
          targetSpinner.spin(msg.speed);             // Kick off animation with synchronized velocity
        }
      }

      if (msg.type === 'GAME_STATE_UPDATE' && msg.roomCode === activeRoomCode) {
        currentRoundNum = msg.round;
        cardFlipsCount = msg.flips;
        document.getElementById('cardImage').src = msg.cardSrc;
        document.getElementById('roundHeader').innerText = `Round ${currentRoundNum}: ${roundDescriptions[currentRoundNum] || 'Game Playing'}`;
        
        spinners.categories.winningValue = msg.categoriesValue;
        spinners.letters.winningValue = msg.lettersValue;
        spinners.vowels.winningValue = msg.vowelsValue;

        // Only enforce exact static offsets if the spinners are not already in their animation routines
        if (!spinners.categories.isSpinning && msg.categoriesOffset !== undefined) spinners.categories.yOffset = msg.categoriesOffset;
        if (!spinners.letters.isSpinning && msg.lettersOffset !== undefined) spinners.letters.yOffset = msg.lettersOffset;
        if (!spinners.vowels.isSpinning && msg.vowelsOffset !== undefined) spinners.vowels.yOffset = msg.vowelsOffset;

        spinners.categories.redraw();
        spinners.letters.redraw();
        spinners.vowels.redraw();
      }

      if (msg.type === 'SETTINGS_UPDATE' && msg.roomCode === activeRoomCode) {
        flipsTargetLimit = msg.flipsTargetLimit;
        gameDataPools = msg.gameDataPools;
        localStorage.setItem('shared_game_data_pools', JSON.stringify(gameDataPools));

        Object.keys(spinners).forEach(k => {
          if (spinners[k]) {
            spinners[k].yOffset = 0;
            spinners[k].redraw();
          }
        });
        document.getElementById('roundHeader').innerText = `Round ${currentRoundNum}: ${roundDescriptions[currentRoundNum] || 'Game Playing'}`;
      }

      if (msg.type === 'PLAYER_LEAVING' && msg.roomCode === activeRoomCode) {
        roomPlayersList = roomPlayersList.filter(p => p !== msg.playerId);
        totalPlayers = roomPlayersList.length;
        if (currentTurnOwnerId === msg.playerId) {
          currentTurnOwnerId = roomPlayersList[0] || null;
        }
        if (msg.playerId === roomPlayersList[0]) {
          isHost = (localPlayerId === roomPlayersList[0]);
        }
        saveRoomState();
        renderRoomModalUI();
        evaluateTurnControls();
      }

      if (msg.type === 'GAME_OVER' && msg.roomCode === activeRoomCode) {
        showGameOverScreen();
      }
    }

    function showGameOverScreen() {
      const container = document.getElementById('viewContainer');
      container.innerHTML = `
        <div class="game-over-view">
          <div class="go-title">GAME OVER!</div>
          <div class="go-desc">All three gameplay rounds have been successfully finished.</div>
          <button class="restart-btn" onclick="resetGameSession()">Start Again</button>
        </div>
      `;
      document.getElementById('outputLabel').innerText = "";
      document.getElementById('settingsBtn').disabled = true;
      document.getElementById('myGamesBtn').disabled = true;
    }

    function resetGameSession() {
      sessionStorage.clear();
      location.reload(); 
    }

    function openPromptEditor() {
      if (activeRoomCode && !isHost) return;
      
      document.getElementById('input-limit').value = flipsTargetLimit;
      document.getElementById('input-words').value = gameDataPools.words.join('\n');
      document.getElementById('input-actions').value = gameDataPools.actions.join('\n');
      document.getElementById('input-categories').value = gameDataPools.categories.join('\n');
      document.getElementById('input-letters').value = gameDataPools.letters.join('\n');
      document.getElementById('input-vowels').value = gameDataPools.vowels.join('\n');
      document.getElementById('input-chameleon').value = gameDataPools.chameleon.join('\n');
      document.getElementById('settingsPopup').classList.add('active');
    }

    function closePromptEditor() {
      document.getElementById('settingsPopup').classList.remove('active');
    }

    function saveConfigChanges() {
      const limitVal = parseInt(document.getElementById('input-limit').value);
      if (limitVal > 0) flipsTargetLimit = limitVal;

      if (activeRoomCode) {
        totalPlayers = roomPlayersList.length;
      }

      const parseLines = (id) => document.getElementById(id).value.split('\n').map(l => l.trim()).filter(l => l);

      gameDataPools.words = parseLines('input-words');
      gameDataPools.actions = parseLines('input-actions');
      gameDataPools.categories = parseLines('input-categories');
      gameDataPools.letters = parseLines('input-letters');
      gameDataPools.vowels = parseLines('input-vowels');
      gameDataPools.chameleon = parseLines('input-chameleon'); 

      localStorage.setItem('shared_game_data_pools', JSON.stringify(gameDataPools));

      Object.keys(spinners).forEach(k => {
        if (spinners[k]) {
          spinners[k].yOffset = 0;
          spinners[k].redraw();
        }
      });

      document.getElementById('roundHeader').innerText = `Round ${currentRoundNum}: ${roundDescriptions[currentRoundNum] || 'Game Playing'}`;
      closePromptEditor();

      if (activeRoomCode && isHost) {
        sendNetworkMessage({
          type: 'SETTINGS_UPDATE',
          roomCode: activeRoomCode,
          flipsTargetLimit: flipsTargetLimit,
          gameDataPools: gameDataPools
        });
      }
      
      broadcastGameState();
    }

    if(!localStorage.getItem('shared_game_data_pools')) {
      localStorage.setItem('shared_game_data_pools', JSON.stringify(gameDataPools));
    } else {
      try {
        gameDataPools = JSON.parse(localStorage.getItem('shared_game_data_pools'));
      } catch (e) {
        console.error("Failed to parse shared game pools:", e);
      }
    }

    evaluateTurnControls();
  </script>
</body>
</html>
