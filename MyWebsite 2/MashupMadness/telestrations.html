<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telestrations</title>
    <style>
        /* --- COLOR PALETTE (EXACT KIVY CONFIGURATION) --- */
        :root {
            --bg-color: #1A1A1E;       
            --button-bg: #2E3056;      
            --canvas-bg: #ffffff;      
            --ink-color: #000000;      
            --text-color: #ffffff;
            --accent-warn: #ffa64d;    
            --accent-danger: #ff4d4d;  
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            position: fixed;
        }

        /* --- SCREEN CONTAINER --- */
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            flex-direction: column;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
        }

        /* --- WIDGET STYLES MAPPED TO KIVY UI --- */
        .kivy-label {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            color: var(--text-color);
        }

        .kivy-button {
            background-color: var(--button-bg);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .kivy-button:active {
            opacity: 0.8;
        }

        .kivy-textinput {
            width: 100%;
            border: none;
            background-color: #f5f5f5;
            color: #000;
            -webkit-user-select: text;
            user-select: text;
            outline: none;
            box-sizing: border-box;
        }

        /* --- MAIN MENU SPECIFIC LAYOUT --- */
        .menu-anchor {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-main-layout {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 500px;
        }

        .menu-header-layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 80px;
            margin-bottom: 25px;
        }

        .menu-title-label {
            width: 100%;
            height: 100%;
            justify-content: center;
            text-align: center;
            font-weight: bold;
        }

        .menu-word-input {
            height: 55px;
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .menu-start-btn {
            height: 60px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .menu-back-btn {
            height: 45px;
            font-weight: normal;
            border-radius: 4px;
        }

        /* --- GAMEPLAY AND CANVAS LAYOUTS --- */
        .hint-label-top { height: 8%; font-size: 1.35rem; }
        .hint-label-timer { height: 5%; font-size: 1.1rem; color: var(--accent-warn); }
        .hint-label-timer.running { color: var(--accent-danger); }
        .hint-widget-center { flex-grow: 1; margin-bottom: 15px; position: relative; border-radius: 4px; overflow: hidden; }
        .hint-button-bottom { height: 10%; font-size: 1.1rem; border-radius: 4px; }
        .hint-input-bottom { height: 10%; font-size: 1rem; padding: 0 15px; border-radius: 4px; margin-bottom: 15px; }

        /* --- CANVAS COMPONENT --- */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--canvas-bg);
            touch-action: none;
            -webkit-touch-callout: none;
        }

        /* --- IMAGE VIEWER COMPONENT --- */
        .ui-image {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ui-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* --- SCROLLVIEW ARCHITECTURE --- */
        .kivy-scrollview {
            flex-grow: 1;
            width: 100%;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .scroll-content {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .history-text-node {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .history-image-node {
            height: 250px;
            background-color: var(--canvas-bg);
            display: block;
            margin: 0 auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="telestrations_menu" class="screen active">
        <div class="menu-anchor">
            <div class="menu-main-layout">
                <div class="menu-header-layout">
                    <div id="menu-title" class="kivy-label menu-title-label">Telestrations</div>
                </div>
                <input type="text" id="word-input" class="kivy-textinput menu-word-input" placeholder="Enter a secret word/phrase to start...">
                <button class="kivy-button menu-start-btn" onclick="startGame()">Start Game</button>
                <a class="kivy-button menu-back-btn" href="MashupMadness.html">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <div id="telestrations_draw_screen" class="screen">
        <div id="draw-prompt" class="kivy-label hint-label-top">Draw this: </div>
        <div id="draw-timer" class="kivy-label hint-label-timer">Time Left: 5:00 (Starts when you draw)</div>
        <div class="hint-widget-center" id="canvas-wrapper">
            <canvas id="drawing-canvas"></canvas>
        </div>
        <button class="kivy-button hint-button-bottom" onclick="submitDrawing()">Done! Pass Device</button>
    </div>

    <div id="telestrations_guess_screen" class="screen">
        <div class="kivy-label hint-label-top">What is this drawing?</div>
        <div id="guess-timer" class="kivy-label hint-label-timer running">Time Left: 5:00</div>
        <div class="hint-widget-center">
            <div class="ui-image">
                <img id="guess-image" src="" alt="Texture Node View">
            </div>
        </div>
        <input type="text" id="guess-input" class="kivy-textinput hint-input-bottom" placeholder="Type your guess here...">
        <button class="kivy-button hint-button-bottom" onclick="submitGuess(false)">Submit Guess & Pass</button>
    </div>

    <div id="telestrations_end_screen" class="screen">
        <div class="kivy-label hint-label-top" style="font-weight: bold; font-size: 1.5rem; height: 10%;">Game Over! Here is the chain:</div>
        <div class="kivy-scrollview">
            <div class="scroll-content" id="end-scroll-content"></div>
        </div>
        <a class="kivy-button menu-back-btn" href="MashupMadness.html">Back to Dashboard</a>
    </div>

    <script>
        let game_history = [];
        let TOTAL_MINUTES = 5;
        let TOTAL_PLAYERS = 4;
        
        let timerInterval = null;
        let timeLeft = 0;
        let timerStarted = false;

        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        const titleLabel = document.getElementById('menu-title');
        const resizeObserver = new ResizeObserver(entries => {
            if (isDrawing) return;

            for (let entry of entries) {
                if(entry.target.id === 'menu-title') {
                    titleLabel.style.fontSize = `${entry.contentRect.height * 0.55}px`;
                } else if(entry.target.id === 'canvas-wrapper') {
                    const buffer = document.createElement('canvas');
                    buffer.width = canvas.width;
                    buffer.height = canvas.height;
                    const bCtx = buffer.getContext('2d');
                    bCtx.drawImage(canvas, 0, 0);

                    canvas.width = entry.contentRect.width;
                    canvas.height = entry.contentRect.height;
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(buffer, 0, 0);
                    
                    applyContextStyles();
                }
            }
        });
        resizeObserver.observe(titleLabel);
        resizeObserver.observe(document.getElementById('canvas-wrapper'));

        function applyContextStyles() {
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'telestrations_draw_screen') {
                initDrawScreen();
            } else if (screenId === 'telestrations_guess_screen') {
                initGuessScreen();
            } else if (screenId === 'telestrations_end_screen') {
                initEndScreen();
            }
        }

        function goToDashboard() {
            alert("Navigating to screen: main_dashboard");
        }

        function startGame() {
            const wordInput = document.getElementById('word-input');
            const secretWord = wordInput.value.trim();
            
            // UPDATED: Check localStorage first, otherwise fallback to default 4
            const storedPlayers = localStorage.getItem('globalPlayersCount');
            let playerCount = storedPlayers ? parseInt(storedPlayers) : 4;

            if (secretWord && playerCount >= 2) {
                TOTAL_PLAYERS = playerCount;
                game_history = [secretWord];
                wordInput.value = '';
                changeScreen('telestrations_draw_screen');
            } else if (!secretWord) {
                alert("Please enter a secret word/phrase to begin.");
            } else if (playerCount < 2) {
                alert("Game requires at least 2 players. Please adjust configuration in settings.");
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `Time Left: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function initDrawScreen() {
            const wrapper = document.getElementById('canvas-wrapper');
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            applyContextStyles();

            const prompt = game_history[game_history.length - 1];
            document.getElementById('draw-prompt').innerHTML = `Draw this: <span style="font-weight:bold; margin-left:6px;">${prompt}</span>`;
            
            timeLeft = TOTAL_MINUTES * 60;
            timerStarted = false;
            clearInterval(timerInterval);
            
            const timerLabel = document.getElementById('draw-timer');
            timerLabel.innerText = `Time Left: ${TOTAL_MINUTES.toString().padStart(2, '0')}:00 (Starts when you draw)`;
            timerLabel.className = "kivy-label hint-label-timer";

            setupCanvasListeners();
        }

        function startDrawingTimer() {
            if (timerStarted) return;
            timerStarted = true;
            
            const timerLabel = document.getElementById('draw-timer');
            timerLabel.className = "kivy-label hint-label-timer running";
            
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerLabel.innerText = `Time Left: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    submitDrawing();
                }
            }, 1000);
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: ((e.clientX - rect.left) / rect.width) * canvas.width,
                y: ((e.clientY - rect.top) / rect.height) * canvas.height
            };
        }

        function setupCanvasListeners() {
            canvas.onpointerdown = (e) => {
                canvas.setPointerCapture(e.pointerId);
                e.preventDefault();
                const coords = getCanvasCoords(e);
                startDraw(coords.x, coords.y);
            };

            canvas.onpointermove = (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const coords = getCanvasCoords(e);
                draw(coords.x, coords.y);
            };

            canvas.onpointerup = (e) => {
                try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
                e.preventDefault();
                stopDraw();
            };
            
            canvas.onpointercancel = (e) => {
                try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
                stopDraw();
            };
        }

        function startDraw(x, y) {
            isDrawing = true;
            startDrawingTimer();
            applyContextStyles();
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function draw(x, y) {
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function stopDraw() {
            isDrawing = false;
            ctx.beginPath();
        }

        function submitDrawing() {
            clearInterval(timerInterval);
            const dataURL = canvas.toDataURL();
            game_history.push(dataURL);
            changeScreen('telestrations_guess_screen');
        }

        function initGuessScreen() {
            document.getElementById('guess-input').value = '';
            const lastDrawing = game_history[game_history.length - 1];
            document.getElementById('guess-image').src = lastDrawing;
            
            timeLeft = TOTAL_MINUTES * 60;
            const timerLabel = document.getElementById('guess-timer');
            timerLabel.innerText = `Time Left: ${TOTAL_MINUTES.toString().padStart(2, '0')}:00`;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerLabel.innerText = `Time Left: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    submitGuess(true);
                }
            }, 1000);
        }

        function submitGuess(isTimeout) {
            clearInterval(timerInterval);
            let guessText = "Ran out of time!";
            
            if (!isTimeout) {
                const inputVal = document.getElementById('guess-input').value.trim();
                guessText = inputVal || "No Guess Given";
            }

            game_history.push(guessText);

            if (game_history.length >= TOTAL_PLAYERS) {
                changeScreen('telestrations_end_screen');
            } else {
                changeScreen('telestrations_draw_screen');
            }
        }

        function initEndScreen() {
            const container = document.getElementById('end-scroll-content');
            container.innerHTML = '';
            
            game_history.forEach((item, idx) => {
                if (idx % 2 === 0) {
                    const label = document.createElement('div');
                    label.className = 'history-text-node';
                    label.innerHTML = idx === 0 ? `Original Word: <span style="font-weight:bold; margin-left:5px;">${item}</span>` : `Guess: <span style="font-weight:bold; margin-left:5px;">${item}</span>`;
                    container.appendChild(label);
                } else {
                    const img = document.createElement('img');
                    img.className = 'history-image-node';
                    img.src = item;
                    container.appendChild(img);
                }
            });
        }
    </script>
</body>
</html>
